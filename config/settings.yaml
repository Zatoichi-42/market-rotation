# Data settings
data:
  lookback_days: 504        # ~2 years trading days for z-score history
  fetch_period: "2y"        # yfinance download period
  cache_expiry_hours: 18    # Re-fetch if cache older than this
  backfill_years: 3         # For backfill.py: how far back to pull

# RS computation windows
rs:
  windows: [5, 20, 60]
  slope_window: 5
  composite_weights:         # 5d / 20d / 60d
    5: 0.20
    20: 0.50
    60: 0.30

# Regime gate thresholds
regime:
  vix:
    normal_max: 20
    fragile_max: 30
  term_structure:
    contango_max: 0.95
    flat_max: 1.05
  breadth:
    normal_min_zscore: 0.0
    fragile_min_zscore: -1.0
  credit:
    normal_min_zscore: -0.5
    fragile_min_zscore: -1.5
  gate:
    hostile_threshold: 2
    fragile_mixed: true

# Normalization
normalization:
  zscore_window: 504
  decay_halflife: 10
  decay_start_unchanged: 10

# Pump Score pillar weights
pump_score:
  rs_weight: 0.40
  participation_weight: 0.30
  flow_weight: 0.30

# Industry RS settings (Phase 2)
industry:
  rs_vs_parent_weight: 0.30
  rs_vs_spy_weight: 0.70
  min_history_days: 60
  short_history_confidence_penalty: 20

# Reversal Score pillar weights (Phase 2)
reversal_score:
  breadth_det_weight: 0.40
  price_break_weight: 0.30
  crowding_weight: 0.30

# Reversal sub-signal parameters (Phase 2)
reversal:
  rs_slope_lookback: 5
  rs_slope_reversal_threshold: 0
  participation_decay_window: 20
  failed_breakout_lookback: 20
  failed_breakout_reversal_days: 3
  gap_threshold_pct: 0.005
  gap_fade_lookback: 20
  clv_short_window: 5
  clv_long_window: 20
  follow_through_window: 10
  distance_ma_period: 20
  rvol_lookback: 20
  price_accel_fast: 5
  price_accel_slow: 20

# Turnover Filter (Phase 2)
turnover:
  min_delta_advantage: 0.08
  min_persistence_sessions: 3
  exempt_states:
    - "Distribution"
    - "Overt Dump"
    - "Ambiguous"

# State classifier (7-state symmetric architecture)
state:
  broadening:
    rs_delta_positive_sessions: 5
    min_pump_percentile: 50
  overt_pump:
    min_pump_percentile: 75
    min_confidence: 40
  distribution:
    pump_delta_negative_sessions: 3
  exhaustion:
    pump_delta_nonpositive_sessions: 3
    requires_prior_high: true
    prior_high_lookback: 20
  overt_dump:
    all_rs_negative: true
    pump_delta_negative_sessions: 5
    min_reversal_percentile: 75
    min_rank_bottom_pct: 0.25
    min_confidence: 40
  ambiguous:
    conflicting_sessions: 3
    max_duration: 15
  veto:
    reversal_pctl_bullish_block: 90
    reversal_pctl_ambiguous_force: 75
    min_confidence_for_directional: 25
  confidence_floors:
    overt_pump: 40
    overt_dump: 40
    broadening: 35
    exhaustion: 35
    accumulation: 25
    distribution: 25
    ambiguous: 10

# Catalyst Gate (Gap Fix 1)
catalyst:
  # Confidence penalty for CAUTION action
  caution_confidence_penalty: 15
  # Confidence penalty for EMBARGO action
  embargo_confidence_penalty: 25
  # Earnings season confidence penalty (softer)
  earnings_confidence_penalty: 10
  # Shock detection: number of sectors that must move >1σ for broad shock
  shock_multi_sector_threshold: 8
  # Shock magnitude that triggers SHOCK_PAUSE (z-score of sector returns)
  shock_pause_threshold: 2.0
  # Shock magnitude that also forces regime recheck
  shock_regime_recheck_threshold: 3.0

# Cross-sector correlation
correlation:
  window: 21
  zscore_window: 504
  fragile_zscore: 0.5
  hostile_zscore: 1.5
  absolute_hostile: 0.80

# Gold/VIX divergence (margin-call detector)
gold_divergence:
  gold_decline_threshold: -0.02
  spy_decline_threshold: -0.02
  vix_threshold: 25

# Arrow indicators
arrows:
  flat_threshold: 0.005

# Gold/Silver Ratio (regime modifier)
gold_silver_ratio:
  zscore_window: 504
  fragile_zscore: 1.0
  hostile_zscore: 2.0

# Concentration Monitor (Gap Fix 4)
concentration:
  # Number of leaders to track per sector
  top_n_leaders: 5
  # EW/CW z-score thresholds for concentration levels
  elevated_zscore: -0.5         # Below this = elevated concentration
  extreme_zscore: -1.5          # Below this = extreme concentration
  # Leader health thresholds
  leader_strong_min_avg_rs: 0.0   # Average leader RS vs sector > this = strong
  leader_deteriorating_max_rs: -0.02  # Average leader RS below this = deteriorating
  leader_dispersion_mixed: 0.03   # RS dispersion above this = mixed (some up, some down)
  # Participation modifier bounds
  healthy_modifier: 15            # Bonus when concentrated but leaders strong
  unhealthy_modifier: -15         # Penalty when concentrated and leaders weak

