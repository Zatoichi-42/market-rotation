# Data settings
data:
  lookback_days: 504        # ~2 years trading days for z-score history
  fetch_period: "2y"        # yfinance download period
  cache_expiry_hours: 18    # Re-fetch if cache older than this
  backfill_years: 3         # For backfill.py: how far back to pull

# RS computation windows
rs:
  windows: [2, 5, 10, 20, 60, 120]
  slope_window: 5
  composite_weights:         # Only 5d / 20d / 60d enter composite
    5: 0.20
    20: 0.50
    60: 0.30

# Regime gate thresholds
regime:
  vix:
    normal_max: 20
    fragile_max: 30
  term_structure:
    contango_max: 0.95
    flat_max: 1.05
  breadth:
    normal_min_zscore: 0.0
    fragile_min_zscore: -1.0
  credit:
    normal_min_zscore: -0.5
    fragile_min_zscore: -1.5
  move:
    enrich_threshold: 130    # MOVE above this worsens Risk Appetite by 1 level
    fragile_min: 110         # For treasury context reporting
    hostile_min: 130         # For treasury context reporting
  sb_correlation:
    enrich_threshold: 0.30   # SB-corr above this worsens Correlation by 1 level
    fragile: 0.15            # For treasury context reporting
    hostile: 0.30            # For treasury context reporting
  gate:
    hostile_threshold: 2
    fragile_mixed: true

# Normalization
normalization:
  zscore_window: 504
  decay_halflife: 10
  decay_start_unchanged: 10

# Pump Score pillar weights
pump_score:
  rs_weight: 0.40
  participation_weight: 0.30
  flow_weight: 0.30

# Industry RS settings (Phase 2)
industry:
  rs_vs_parent_weight: 0.30
  rs_vs_spy_weight: 0.70
  min_history_days: 60
  short_history_confidence_penalty: 20

# Reversal Score pillar weights (Phase 2)
reversal_score:
  breadth_det_weight: 0.40
  price_break_weight: 0.30
  crowding_weight: 0.30

# Reversal sub-signal parameters (Phase 2)
reversal:
  rs_slope_lookback: 5
  rs_slope_reversal_threshold: 0
  participation_decay_window: 20
  failed_breakout_lookback: 20
  failed_breakout_reversal_days: 3
  gap_threshold_pct: 0.005
  gap_fade_lookback: 20
  clv_short_window: 5
  clv_long_window: 20
  follow_through_window: 10
  distance_ma_period: 20
  rvol_lookback: 20
  price_accel_fast: 5
  price_accel_slow: 20

# Turnover Filter (Phase 2)
turnover:
  min_delta_advantage: 0.08
  min_persistence_sessions: 3
  exempt_states:
    - "Distribution"
    - "Overt Dump"
    - "Ambiguous"

# State classifier (7-state symmetric architecture)
state:
  broadening:
    rs_delta_positive_sessions: 5
    min_pump_percentile: 50
  overt_pump:
    min_pump_percentile: 75
    min_confidence: 40
  distribution:
    pump_delta_negative_sessions: 3
  exhaustion:
    pump_delta_nonpositive_sessions: 3
    requires_prior_high: true
    prior_high_lookback: 20
  overt_dump:
    all_rs_negative: true
    pump_delta_negative_sessions: 5
    min_reversal_percentile: 75
    min_rank_bottom_pct: 0.25
    min_confidence: 40
  ambiguous:
    conflicting_sessions: 3
    max_duration: 15
  veto:
    reversal_pctl_bullish_block: 90
    reversal_pctl_ambiguous_force: 75
    min_confidence_for_directional: 25
  sustained_leader:
    min_rs_60d: 0.15             # 60d RS must exceed this for sustained leader exemption
    extra_exh_sessions: 3        # Added to min_exh_sessions (6 total vs 3 default)
    exh_rev_bar: 80              # Higher reversal threshold for sustained leaders
    broadening_max_consec_neg: 6 # More generous negative delta tolerance

  confidence_floors:
    overt_pump: 40
    overt_dump: 40
    broadening: 35
    exhaustion: 35
    accumulation: 25
    distribution: 25
    ambiguous: 10

# Catalyst Gate (Gap Fix 1)
catalyst:
  # Confidence penalty for CAUTION action
  caution_confidence_penalty: 15
  # Confidence penalty for EMBARGO action
  embargo_confidence_penalty: 25
  # Earnings season confidence penalty (softer)
  earnings_confidence_penalty: 10
  # Shock detection: number of sectors that must move >1σ for broad shock
  shock_multi_sector_threshold: 8
  # Shock magnitude that triggers SHOCK_PAUSE (z-score of sector returns)
  shock_pause_threshold: 2.0
  # Shock magnitude that also forces regime recheck
  shock_regime_recheck_threshold: 3.0

# Cross-sector correlation
correlation:
  window: 21
  zscore_window: 504
  fragile_zscore: 0.5
  hostile_zscore: 1.5
  absolute_hostile: 0.80

# Gold/VIX divergence (margin-call detector)
gold_divergence:
  gold_decline_threshold: -0.02
  spy_decline_threshold: -0.02
  vix_threshold: 25

# Arrow indicators
arrows:
  flat_threshold: 0.005

# Gold/Silver Ratio (regime modifier)
gold_silver_ratio:
  zscore_window: 504
  fragile_zscore: 1.0
  hostile_zscore: 2.0

# Treasury Context (Constitution v9)
treasury:
  sb_corr_window: 21
  sb_corr_supportive: -0.15      # Below this = Supportive
  sb_corr_adverse: 0.15          # Above this = Adverse
  move_fragile: 110
  move_hostile: 130
  gate_watch_proximity_pct: 0.20  # Within 20% of threshold = near-flip

# Cross-Horizon Divergence
horizon:
  near_zero_threshold: 0.003      # ±0.3% RS treated as flat
  conviction_high: 0.15           # Sum of |confirming RS| for high conviction
  conviction_mid: 0.05
  dead_cat_vetoes_accumulation: true

# Regime Character
regime_character:
  spy_trend_threshold: 0.02       # SPY 20d return > ±2% for trending
  vix_bull_max: 22                # VIX < this for trending bull
  vix_bear_min: 18                # VIX > this for trending bear
  dispersion_high_pctl: 75        # Cross-sector dispersion > this percentile = rotation
  persistence_sessions: 3         # Sessions to confirm character change
  instability_window: 15          # If 3+ character changes in this window → CHOPPY

# Exit Monitor
exit:
  delta_decel_sessions: 3
  reversal_erosion_threshold: 0.15
  volume_climax_rvol: 2.0
  volume_no_follow_through_pct: 0.003
  failed_breakout_warning: 0.60
  failed_breakout_alert: 0.70
  relative_stop_warning: 0.05
  relative_stop_alert: 0.08
  relative_stop_immediate: 0.12
  signals_to_tighten: 2
  signals_to_reduce: 3
  signals_to_exit: 4
  choppy_threshold_reduction: 1
  trending_bull_threshold_increase: 1

# Position Tracker
positions:
  storage_path: "data/store/positions"
  max_open_positions: 6
  peak_tracking: true
  delta_decel_window: 10

# Concentration Monitor (Gap Fix 4)
concentration:
  # Number of leaders to track per sector
  top_n_leaders: 5
  # EW/CW z-score thresholds for concentration levels
  elevated_zscore: -0.5         # Below this = elevated concentration
  extreme_zscore: -1.5          # Below this = extreme concentration
  # Leader health thresholds
  leader_strong_min_avg_rs: 0.0   # Average leader RS vs sector > this = strong
  leader_deteriorating_max_rs: -0.02  # Average leader RS below this = deteriorating
  leader_dispersion_mixed: 0.03   # RS dispersion above this = mixed (some up, some down)
  # Participation modifier bounds
  healthy_modifier: 15            # Bonus when concentrated but leaders strong
  unhealthy_modifier: -15         # Penalty when concentrated and leaders weak

